<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sadie</title>
<meta name="description" content="Sadie — an interdisciplinary artist focused on the absurd, grotesque and developing the new American extremity.">

<!-- ════════════════════════════════════════════════════════════════
     HOW TO EDIT THIS FILE — you only need to touch a few things.

     EDIT ① — your name (search for EDIT ①)
     EDIT ② — the nav links (search for EDIT ②)
     EDIT ③ — your social links (search for EDIT ③)
     EDIT ④ — painting titles + info (search for EDIT ④)
     EDIT ⑤ — the About text (search for EDIT ⑤)
     EDIT ⑥ — your email + Instagram in Contacts (search for EDIT ⑥)

     YOUR ARTWORK:
     Make a folder called  paintings  next to this file and drop your
     photos in named:  hero.jpg  01.jpg  02.jpg  03.jpg  04.jpg ...
     hero.jpg is the big image on the opening screen. The rest fill the
     gallery. Until you add them, neat placeholders show — nothing
     ever looks broken.
     ════════════════════════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#EAECF3;          /* pale cool background behind the art */
  --ink:#111114;         /* near-black text                    */
  --muted:#9A9CA6;       /* greyed-out / secondary nav         */
  --line:#D5D8E2;        /* hairlines                          */
  --sans:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --sidebar:280px;       /* width of the fixed left column     */
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
}
img{ display:block; max-width:100%; }
a{ color:inherit; text-decoration:none; }
::selection{ background:var(--ink); color:var(--bg); }
:focus-visible{ outline:2px solid var(--ink); outline-offset:3px; }

/* ───────────────────────── FIXED LEFT SIDEBAR ───────────────────────── */
.sidebar{
  position:fixed;
  top:0; left:0; bottom:0;
  width:var(--sidebar);
  padding:clamp(34px,4vw,52px) clamp(24px,2.4vw,38px);
  display:flex;
  flex-direction:column;
  z-index:20;
  background:var(--bg);
}

/* EDIT ① : your name. Big, bold, tight. Add a surname on its own line if you want. */
.brand{
  font-weight:800;
  font-size:clamp(26px,2.1vw,32px);
  line-height:1.02;
  letter-spacing:-0.02em;
  margin-bottom:clamp(40px,5vw,64px);
}

/* the navigation, right-aligned in clustered groups like the reference */
nav{ text-align:right; }
.nav-group{ margin-bottom:1.5em; }
.nav-group a,
.nav-group span{
  display:block;
  font-weight:700;
  font-size:13px;
  letter-spacing:0.08em;
  line-height:1.85;
  text-transform:uppercase;
}
.nav-group a{ transition:opacity .15s ease; }
.nav-group a:hover{ opacity:0.45; }
.nav-group .disabled{ color:var(--muted); cursor:default; } /* greyed item, e.g. FAVORITE */

/* social icons pinned to the bottom of the sidebar */
.socials{
  margin-top:auto;
  display:flex;
  justify-content:flex-end;
  gap:16px;
  padding-top:32px;
}
.socials a{ color:var(--muted); transition:color .15s ease; }
.socials a:hover{ color:var(--ink); }
.socials svg{ width:19px; height:19px; display:block; }

/* ───────────────────────── MAIN ART AREA ───────────────────────── */
.main{
  margin-left:var(--sidebar);
  min-height:100svh;
}

/* the opening screen: one large work, bleeding to the top + right edges */
.hero{
  min-height:100svh;
  padding:clamp(40px,5vw,72px) 0 0 clamp(20px,3vw,48px);
}
.hero .plate{ position:relative; height:100%; }
.hero img{
  width:100%;
  height:auto;
  max-height:88svh;
  object-fit:contain;
  object-position:top left;
}

/* placeholder (shown until an image file exists) */
.ph{
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:10px;
  background:
    repeating-linear-gradient(45deg,#fff 0 22px,#f4f5f9 22px 44px);
  border:1px solid var(--line);
  color:var(--muted);
  text-align:center;
  padding:2rem;
}
.ph.hero-ph{ height:78svh; }
.ph .n{ font-weight:800; font-size:clamp(24px,3vw,40px); letter-spacing:.04em; }
.ph .h{ font-size:13px; letter-spacing:.04em; max-width:24ch; }

/* ───────────────────────── SECTIONS ───────────────────────── */
section{ scroll-margin-top:40px; }
.wrap{ padding:clamp(56px,8vw,110px) clamp(24px,4vw,72px) clamp(56px,8vw,110px) clamp(20px,3vw,48px); }

.eyebrow{
  font-weight:700;
  font-size:13px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:clamp(28px,4vw,44px);
  padding-bottom:14px;
  border-bottom:1px solid var(--line);
}

/* gallery: clean responsive grid, art on the cool ground */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:clamp(20px,3vw,42px);
}
figure.work{ margin:0; }
figure.work .frame{ background:#fff; padding:14px; box-shadow:0 1px 2px rgba(17,17,20,.05); }
figure.work img{ width:100%; }
figure.work .ph{ aspect-ratio:4/5; }
figure.work figcaption{
  margin-top:12px;
  font-size:13px;
  letter-spacing:0.02em;
}
figure.work .ttl{ font-weight:700; }
figure.work .meta{ color:var(--muted); }

/* about + contacts read as quiet editorial text */
.prose{ max-width:62ch; font-size:clamp(16px,1.3vw,18px); }
.prose p + p{ margin-top:1.15em; }

.contact-mail{
  font-weight:800;
  font-size:clamp(22px,2.6vw,34px);
  letter-spacing:-0.01em;
  display:inline-block;
  border-bottom:2px solid var(--ink);
  padding-bottom:2px;
}
.contact-mail:hover{ opacity:.5; }
.contact-rest{ margin-top:1.4em; font-size:clamp(16px,1.3vw,18px); }
.contact-rest a{ border-bottom:1px solid var(--ink); }

footer{
  padding:clamp(40px,6vw,72px) clamp(24px,4vw,72px) 48px clamp(20px,3vw,48px);
  color:var(--muted);
  font-size:12px;
  letter-spacing:0.04em;
  border-top:1px solid var(--line);
}

/* ───────────────────────── MOBILE ───────────────────────── */
.menu-toggle{ display:none; }

@media (max-width: 820px){
  .sidebar{
    position:sticky;
    top:0;
    width:100%;
    height:auto;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px;
    border-bottom:1px solid var(--line);
  }
  .brand{ margin:0; font-size:22px; }
  nav{
    position:absolute;
    top:100%; left:0; right:0;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:18px 20px;
    text-align:left;
  }
  nav[hidden]{ display:none; }
  .nav-group{ margin-bottom:1em; }
  .socials{ margin:1.2em 0 0; justify-content:flex-start; padding-top:18px; border-top:1px solid var(--line); }
  .menu-toggle{
    display:inline-grid; gap:4px; background:none; border:0; cursor:pointer; padding:8px;
  }
  .menu-toggle span{ width:22px; height:2px; background:var(--ink); display:block; }
  .main{ margin-left:0; }
  .hero{ padding:18px; min-height:auto; }
  .hero img, .ph.hero-ph{ max-height:none; height:auto; }
  .ph.hero-ph{ height:60svh; }
  .gallery{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- ═══════════════════ SIDEBAR ═══════════════════ -->
<aside class="sidebar">

  <!-- EDIT ① : your name (two lines = put a <br> where the break goes) -->
  <div class="brand">SADIE</div>

  <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false" aria-controls="nav">
    <span></span><span></span><span></span>
  </button>

  <!-- EDIT ② : the nav. Each group is one cluster. Link them to sections below. -->
  <nav id="nav">
    <div class="nav-group">
      <a href="#paintings">Paintings</a>
    </div>
    <div class="nav-group">
      <a href="#about">About</a>
      <a href="#contacts">Contacts</a>
    </div>
    <div class="nav-group">
      <!-- example of a greyed-out / "coming soon" item like the reference -->
      <span class="disabled">Shop</span>
    </div>

    <!-- EDIT ③ : your social links (delete any you don't use) -->
    <div class="socials">
      <a href="https://instagram.com/yourhandle" aria-label="Instagram" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </a>
      <a href="mailto:hello@example.com" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>
        </svg>
      </a>
    </div>
  </nav>
</aside>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<main class="main">

  <!-- THE OPENING SCREEN: one big work. Add paintings/hero.jpg to fill it. -->
  <header class="hero">
    <div class="plate">
      <img src="paintings/hero.jpg" alt="Featured work by Sadie"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="ph hero-ph">
        <span class="n">SADIE</span>
        <span class="h">add your lead image as paintings/hero.jpg</span>
      </div>
    </div>
  </header>

  <!-- PAINTINGS -->
  <section id="paintings"><div class="wrap">
    <p class="eyebrow">Paintings</p>
    <div class="gallery">

      <!-- EDIT ④ : each work. Photo goes in paintings/ as 01.jpg, 02.jpg ... -->
      <figure class="work">
        <div class="frame">
          <img src="paintings/01.jpg" loading="lazy" alt="Describe work one"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="ph"><span class="n">01</span><span class="h">paintings/01.jpg</span></div>
        </div>
        <figcaption><span class="ttl">Untitled I</span> · <span class="meta">oil on canvas, 2026</span></figcaption>
      </figure>

      <figure class="work">
        <div class="frame">
          <img src="paintings/02.jpg" loading="lazy" alt="Describe work two"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="ph"><span class="n">02</span><span class="h">paintings/02.jpg</span></div>
        </div>
        <figcaption><span class="ttl">Untitled II</span> · <span class="meta">oil on canvas, 2026</span></figcaption>
      </figure>

      <figure class="work">
        <div class="frame">
          <img src="paintings/03.jpg" loading="lazy" alt="Describe work three"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="ph"><span class="n">03</span><span class="h">paintings/03.jpg</span></div>
        </div>
        <figcaption><span class="ttl">Untitled III</span> · <span class="meta">acrylic on panel, 2026</span></figcaption>
      </figure>

      <figure class="work">
        <div class="frame">
          <img src="paintings/04.jpg" loading="lazy" alt="Describe work four"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="ph"><span class="n">04</span><span class="h">paintings/04.jpg</span></div>
        </div>
        <figcaption><span class="ttl">Untitled IV</span> · <span class="meta">mixed media, 2025</span></figcaption>
      </figure>

      <!-- Want more? Copy a whole <figure class="work">…</figure> block,
           paste it below, and bump the number. -->
    </div>
  </div></section>

  <!-- ABOUT -->
  <section id="about"><div class="wrap">
    <p class="eyebrow">About</p>
    <!-- EDIT ⑤ : your bio -->
    <div class="prose">
      <p>SHISHI.</p>
      <p>Marley.</p>
    </div>
  </div></section>

  <!-- CONTACTS -->
  <section id="contacts"><div class="wrap">
    <p class="eyebrow">Contacts</p>
    <!-- EDIT ⑥ : your real email (change the link AND the text) -->
    <a class="contact-mail" href="mailto:hello@example.com">hello@example.com</a>
    <p class="contact-rest">
      or on Instagram — <a href="https://instagram.com/yourhandle" target="_blank" rel="noopener">@yourhandle</a>
    </p>
  </div></section>

  <footer>© 2026 Sadie · hosted free on GitHub Pages</footer>
</main>

<script>
  // mobile menu toggle
  var t = document.getElementById('menuToggle');
  var n = document.getElementById('nav');
  function isMobile(){ return window.matchMedia('(max-width:820px)').matches; }
  function sync(){ if(!isMobile()){ n.hidden=false; } else { n.hidden=true; t.setAttribute('aria-expanded','false'); } }
  t.addEventListener('click', function(){
    var open = n.hidden;
    n.hidden = !open;
    t.setAttribute('aria-expanded', String(open));
  });
  n.addEventListener('click', function(e){
    if(e.target.tagName==='A' && isMobile()){ n.hidden=true; t.setAttribute('aria-expanded','false'); }
  });
  window.addEventListener('resize', sync);
  sync();
</script>

</body>
</html>
